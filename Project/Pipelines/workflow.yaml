                spark.executor.cores: "4"
                spark.driver.cores: "4"
        result: silver_providers_result

    - wait_silver_providers:
        call: http.get
        args:
          url: ${"https://dataproc.googleapis.com/v1/" + silver_providers_result.body.name}
          auth:
            type: OAuth2
        result: silver_providers_status

    - check_silver_providers:
        switch:
          - condition: ${silver_providers_status.body.state == "SUCCEEDED"}
            next: submit_silver_diagnosis
          - condition: ${silver_providers_status.body.state == "FAILED"}
            raise: ${"silver_providers failed: " + silver_providers_status.body.stateMessage}
          - condition: ${silver_providers_status.body.state == "CANCELLED"}
