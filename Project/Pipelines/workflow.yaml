        result: silver_diagnosis_status

    - check_silver_diagnosis:
        switch:
          - condition: ${silver_diagnosis_status.body.state == "SUCCEEDED"}
            next: submit_silver_costs
          - condition: ${silver_diagnosis_status.body.state == "FAILED"}
            raise: ${"silver_diagnosis failed: " + silver_diagnosis_status.body.stateMessage}
          - condition: ${silver_diagnosis_status.body.state == "CANCELLED"}
