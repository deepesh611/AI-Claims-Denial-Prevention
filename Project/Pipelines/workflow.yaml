        call: http.post
        args:
          url: ${"https://dataproc.googleapis.com/v1/projects/" + project_id + "/locations/" + region + "/batches"}
          auth:
            type: OAuth2
          body:
            pysparkBatch:
              mainPythonFileUri: ${scripts_path + "/silver/silver_diagnosis.py"}
              pythonFileUris:
