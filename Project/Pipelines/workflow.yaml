          url: ${"https://dataproc.googleapis.com/v1/projects/" + project_id + "/locations/" + region + "/batches"}
          auth:
            type: OAuth2
          body:
            pysparkBatch:
              mainPythonFileUri: ${scripts_path + "/silver/silver_claims.py"}
              pythonFileUris:
                - ${utils_path}
            runtimeConfig:
              version: "2.0"
              properties:
                spark.executor.instances: "2"
                spark.executor.cores: "4"
                spark.driver.cores: "4"
        result: silver_claims_result

    - wait_silver_claims:
        call: http.get
        args:
          url: ${"https://dataproc.googleapis.com/v1/" + silver_claims_result.body.name}
          auth:
            type: OAuth2
        result: silver_claims_status

    - check_silver_claims:
        switch:
          - condition: ${silver_claims_status.body.state == "SUCCEEDED"}
