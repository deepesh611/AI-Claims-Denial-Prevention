            next: submit_gold_claims
          - condition: ${silver_costs_status.body.state == "FAILED"}
            raise: ${"silver_costs failed: " + silver_costs_status.body.stateMessage}
          - condition: ${silver_costs_status.body.state == "CANCELLED"}
