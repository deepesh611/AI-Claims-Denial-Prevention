          url: ${"https://dataproc.googleapis.com/v1/" + gold_claims_result.body.name}
          auth:
            type: OAuth2
        result: gold_claims_status

    - check_gold_claims:
        switch:
          - condition: ${gold_claims_status.body.state == "SUCCEEDED"}
            next: done
          - condition: ${gold_claims_status.body.state == "FAILED"}
            raise: ${"gold_claims failed: " + gold_claims_status.body.stateMessage}
          - condition: ${gold_claims_status.body.state == "CANCELLED"}
            raise: "gold_claims was cancelled"
        next: wait_gold_claims

    - done:
        return: "Pipeline completed successfully"